# ─── Website Builder — Nginx Configuration ─────────────────────────
# Deploy: sudo cp deploy/nginx.conf /etc/nginx/sites-available/website-builder
#         sudo ln -s /etc/nginx/sites-available/website-builder /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

# ─── API Backend ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.YOURDOMAIN.com;

    # Redirect HTTP → HTTPS (uncomment when SSL is ready)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload limit (match backend's 5MB)
        client_max_body_size 10M;
    }

    # Uploaded files — serve directly (bypass Node.js)
    location /api/uploads/ {
        alias /var/www/website-builder/public/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ─── Published Sites (Wildcard Subdomain) ───────────────────────────
server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.YOURDOMAIN\.com$;

    root /var/www/sites/$subdomain;
    index index.html;

    # Try static file first, fallback to API runtime render
    location / {
        try_files $uri $uri/ @backend;
    }

    location @backend {
        proxy_pass http://127.0.0.1:3000/api/site/live?host=$host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ─── Custom Domains ─────────────────────────────────────────────────
# Each custom domain needs a separate server block or use a catch-all:
# server {
#     listen 80;
#     server_name customdomain.com www.customdomain.com;
#     root /var/www/sites/customdomain.com;
#     index index.html;
# }
